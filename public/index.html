<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus BorrowHub</title>

<style>
:root {
    --green-main: #2ecc71;
    --green-dark: #27ae60;
    --green-light: #dff7ea;
    --text-dark: #1a1a1a;
    --text-light: #777;
    --border: #e6e6e6;
    --bg: linear-gradient(135deg, #e8fdf3, #f6fff9);
    --card: rgba(255,255,255,0.9);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Roboto, sans-serif;
}

body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Auth Container */
.auth-container {
    width: 100%;
    max-width: 380px;
    padding: 20px;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h1 {
    font-size: 24px;
    color: var(--green-dark);
    font-weight: 700;
}

.header p {
    font-size: 13px;
    color: var(--text-light);
}

/* Card */
.card {
    background: var(--card);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.credential-note {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(33, 87, 50, 0.08);
    border: 1px solid rgba(33, 87, 50, 0.14);
    color: var(--text-dark);
    font-size: 13px;
    line-height: 1.6;
}

/* Titles */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--text-dark);
}

/* Inputs */
.form-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: var(--green-main);
    box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.2);
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--green-main), var(--green-dark));
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 15px rgba(46,204,113,0.3);
}

button.secondary {
    background: transparent;
    color: var(--green-dark);
    font-weight: 500;
}

/* Hidden */
.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-section" class="auth-container">

    <div class="header">
        <h1>Campus BorrowHub</h1>
        <p>Borrow smarter. Manage easier.</p>
    </div>

    <!-- Login -->
    <div id="login-section" class="card">
        <h2>Login</h2>
        <form onsubmit="login(event)">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit">Login</button>
            <button type="button" class="secondary" onclick="showForgetPassword()">Forgot Password?</button>
            <button type="button" class="secondary" onclick="showSignUp()">Create account</button>
        </form>
        <!-- <div class="credential-note">
            <strong>Admin access:</strong><br>
            Email: <code>admin@borrowhub.local</code><br>
            Password: <code>Admin123!</code>
        </div> -->
    </div>

    <!-- Signup -->
    <div id="signup-section" class="card hidden">
        <h2>Create Account</h2>
        <form onsubmit="signup(event)">
            <div class="form-group">
                <input type="text" id="firstname" placeholder="First Name" required>
            </div>
            <div class="form-group">
                <input type="text" id="lastname" placeholder="Last Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="signup-email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="signup-password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <select id="signup-role" required>
                    <option value="STUDENT">Student</option>
                    <option value="STAFF">Staff</option>
                </select>
            </div>
            <button type="submit">Sign Up</button>
            <button type="button" class="secondary" onclick="showLogin()">Back to Login</button>
        </form>
    </div>

    <!-- Forget Password -->
    <div id="forget-section" class="card hidden">
        <h2>Reset Password</h2>
        <form onsubmit="forgetPassword(event)">
            <div class="form-group">
                <input type="email" id="forget-email" placeholder="Email" required>
            </div>
            <button type="submit">Send Reset Link</button>
            <button type="button" class="secondary" onclick="showLogin()">Back to Login</button>
        </form>
    </div>

</div>

<script>
const API_BASE = window.location.origin.startsWith('http')
    ? window.location.origin
    : 'http://localhost:3001';

function showSignUp() {
    document.getElementById("login-section").classList.add("hidden");
    document.getElementById("signup-section").classList.remove("hidden");
    document.getElementById("forget-section").classList.add("hidden");
}

function showLogin() {
    document.getElementById("signup-section").classList.add("hidden");
    document.getElementById("login-section").classList.remove("hidden");
    document.getElementById("forget-section").classList.add("hidden");
}

function showForgetPassword() {
    document.getElementById("login-section").classList.add("hidden");
    document.getElementById("signup-section").classList.add("hidden");
    document.getElementById("forget-section").classList.remove("hidden");
}

function login(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // Call backend API
    fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email, password }),
    })
    .then(response => response.json())
    .then(data => {
        if (data.access_token) {
            // Store token in localStorage
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        } else {
            alert('Login failed: ' + (data.message || 'Invalid credentials'));
        }
    })
    .catch(error => {
        console.error('Login error:', error);
        alert('Login failed. Please try again.');
    });
}

function signup(e) {
    e.preventDefault();

    const firstName = document.getElementById("firstname").value;
    const lastName = document.getElementById("lastname").value;
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    const role = document.getElementById("signup-role").value;

    // Call backend API
    fetch(`${API_BASE}/auth/register`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            email,
            password,
            firstName,
            lastName,
            role
        }),
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            alert('Account created successfully! You can now login.');
            showLogin();
        } else {
            alert('Registration failed: ' + (data.message || 'Please try again'));
        }
    })
    .catch(error => {
        console.error('Registration error:', error);
        alert('Registration failed. Please try again.');
    });
}

function forgetPassword(e) {
    e.preventDefault();

    const email = document.getElementById('forget-email').value;

    // Call backend API
    fetch(`${API_BASE}/auth/forget-password`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email }),
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            alert('Password reset link sent to your email! Check the console for the link.');
            showLogin();
        } else {
            alert('Failed to send reset link: ' + (data.message || 'Please try again'));
        }
    })
    .catch(error => {
        console.error('Forget password error:', error);
        alert('Failed to send reset link. Please try again.');
    });
}
</script>

</body>
</html>
